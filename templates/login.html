<!DOCTYPE html>
<html>
<head>
    <title>RSI Divergence Pro AI - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #050816;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-box {
            width: 90%;
            max-width: 380px;
            background: #111827;
            padding: 28px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            margin-bottom: 5px;
        }

        p {
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-top: 14px;
            border: none;
            border-radius: 12px;
            background: #1f2937;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #22c55e;
            color: #03120a;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        .error {
            color: #f87171;
            margin-top: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>RSI Divergence Pro AI</h2>
    <p>Personal trading assistant</p>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
</div>

</body>
</html>
